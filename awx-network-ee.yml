version: 3

images:
  base_image:
    name: registry.redhat.io/ansible-automation-platform-24/ee-supported-rhel9@sha256:bf729e7243b6ba91d23a247d4d150394f3e7927e755657098453f7b47dd26e61

dependencies:
  galaxy: collections/requirements.yml
  python: requirements.txt
  system: bindep.txt

additional_build_steps:
  prepend_base: |
    RUN microdnf update -y && \
        microdnf install -y glibc-all-langpacks langpacks-en && \
        microdnf clean all && \
        rm -rf /var/cache/yum /var/cache/dnf

options:
  package_manager_path: /usr/bin/microdnf
